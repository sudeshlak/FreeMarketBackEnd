# Build & push image, then SSH to EC2 and restart the stack.
#
# Required GitHub repository secrets:
#   EC2_HOST          — public IP or hostname of the instance
#   EC2_USER          — e.g. ubuntu, ec2-user
#   EC2_SSH_KEY       — private key (full PEM, including BEGIN/END lines)
#   EC2_DEPLOY_PATH   — absolute path on the server, e.g. /home/ubuntu/freemarket
#
# Optional:
#   API_IMAGE         — full image name (default: ghcr.io/<owner>/<repo>/api)
#
# On EC2 (one-time):
#   - Install Docker + Docker Compose plugin
#   - Clone or copy this repo (or only docker-compose + .env) to EC2_DEPLOY_PATH
#   - Create .env with DB_USERNAME, DB_PASSWORD, S3_KEY, S3_SECRET, BUCKET_REGION, BUCKET_NAME
#   - If GHCR images are private: docker login ghcr.io -u GITHUB_USERNAME -p GITHUB_PAT
#   - First deploy: set API_IMAGE to the same tag CI pushes, then docker compose pull && docker compose up -d
#
# GitHub: enable "Packages" read/write for Actions if using GHCR (default below).

name: Docker build and deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            export API_IMAGE='${{ secrets.API_IMAGE || format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) }}'
            docker compose pull api
            docker compose up -d api
